- '## 1. Ausgangsproblem'
- 'Gutachter-Feedback zu DP4:'
- '> „Es fehlt in Kapitel 2 noch die Nennung des theoretischen Frameworks, das diese
  Dreiteilung rechtfertigt."'
- 'Bisheriger Stand: Die drei Gate-Dimensionen (strategisch / technisch / Compliance)
  waren im Exposé ohne theoretischen Anker — MLOps/GenAIOps und EU AI Act erklären
  die Compliance-Dimension, aber nicht die Dreiteilung...'
decisions:
- 'DP4 heißt „Trennung von Governance-Ebenen" — aber die drei Kategorien sind **keine
  Governance-Ebenen** (hierarchisch: wer entscheidet?), sondern **thematische Prüfdimensionen**
  (was wird geprüft?). Das Gate-Template (Trigger / Kriterien / Evidence / Decision
  / **Owner** / Audit Trail / Waiver) zeigt jedoch: durch das Owner-Feld ist beides
  implizit enthalten.'
- '- **Entscheidungsverantwortung** (wer/Owner?) → implizite Governance-Ebene'
- '- Make-or-Buy = **vorgelagerte Governance-Entscheidung**, kein Lifecycle-Gate'
- '| **Abgrenzung** | Make-or-Buy = vorgelagerte Governance-Entscheidung, kein Gate
