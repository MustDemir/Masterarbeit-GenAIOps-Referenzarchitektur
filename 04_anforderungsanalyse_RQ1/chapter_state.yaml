critical_definitions:
  - "Enforcement ≠ Dokumentation: Architektur erzwingt Compliance technisch, nicht nur als Papierspur (4.1)"
  - "Pre-Deployment = Datenkuration → Modellvalidierung; Deployment = Integration+Staging+Release; Operation = Monitoring+Audit+PMS (4.2)"
  - "Dreistufige Transformation: Norm (Art. 9-15) → Requirement (R-xx) → Gate (G-xx) — keine Zwischenstufe, kein juristischer Kommentar (4.3)"
  - "3 Kontrollmechanismen: Policy-as-Code (praev.), Continuous Monitoring (reakt.), Audit Trails (retrospekt.) — exklusive Zuordnung pro Requirement (4.4)"
  - "Human Oversight ≠ manuelle Pruefung: Institutionalised Distrust (Laux) + 4 Effektivitaetsbedingungen (Sterz) als Designprinzip (4.5)"
  - "4.6 = WAS (Requirements R-xx), 5.3 = WIE (Gate-Specs G-xx) — DSR-logische Trennung Design Cycle Phase 1 vs. Phase 2"
  - "Deployer-Scope: nur Art. 26 Pflichten, Provider-Pflichten (Art. 16) explizit ausgeschlossen, Art. 25 = Scope-Trigger (4.2)"
  - "Retirement-Phase: explizit Out-of-Scope (Provider-Verantwortung Art. 16 Abs. 1 lit. j)"
