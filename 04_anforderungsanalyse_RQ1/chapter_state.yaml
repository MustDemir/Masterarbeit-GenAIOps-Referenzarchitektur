decisions:
  - id: "D_4.5_STRUCTURE"
    decision: "4.5 Human Oversight bleibt eigener Abschnitt"
    rationale: "162 kumulative Zitationen (Laux 63 + Sterz 51 + Enqvist 48), Querschnittsanforderung, eigenstaendiger theoretischer Rahmen (Institutionalised Distrust)"
    date: "2026-03-05"
  - id: "D_KAP4_PAGES"
    decision: "Kap. 4 Zielbudget ~13 Seiten"
    rationale: "60-80 Seiten Gesamtthesis, Kap. 5 (Architektur) bekommt groessten Anteil (15-18 S.)"
    date: "2026-03-05"
  - id: "D_MQG4AI_PLACEMENT"
    decision: "Elia et al. (2025)/MQG4AI zitieren in Kap. 2 Related Work + Kurzreferenz Kap. 4.6"
    rationale: "Wissenschaftliche Redlichkeit, Gutachter-Risiko (oeffentlich auf arXiv+GitHub), staerkt USP durch Abgrenzung (konzeptionell vs. operationalisiert)"
    date: "2026-03-05"
  - id: "D_2026_SOURCES"
    decision: "2026-Quellen (Butt, Leon) nur als konvergente Evidenz"
    rationale: "0 Zitationen, nur zusammen mit etablierten Quellen verwenden"
    date: "2026-03-05"
  - id: "D_ART25_DEPTH"
    decision: "Art. 25 Provider-Aufstieg: 1-2 Absaetze innerhalb 4.2, KEIN eigener Sub-Abschnitt"
    rationale: "Art. 25 = Scope-Caveat/Trigger, kein eigenstaendiges Lifecycle-Konzept. Bei 2 Seiten Budget keine eigene Gliederungsebene. Tiefenanalyse (wann RAG = wesentliche Aenderung?) → Kap. 7 Limitation."
    date: "2026-03-05"
  - id: "D_RETIREMENT_OUT"
    decision: "Retirement-Phase explizit ausgeschlossen (nicht unter Operation subsumiert)"
    rationale: "Model-Dekommissionierung = Provider-Verantwortung (Art. 16 Abs. 1 lit. j), ausserhalb Deployer-Scope. Expliziter Ausschluss-Satz staerkt Scope-Argument und verhindert Gutachter-Fragen."
    date: "2026-03-05"
  - id: "D_GATE_IDS_LOCATION"
    decision: "Gate-IDs (G-PRE-01 etc.) erst in 4.6, in 4.2 nur konzeptionell"
    rationale: "Saubere Traceability-Kette: 4.2 Lifecycle → 4.3 Transformation → 4.4 Kontrolle → 4.6 formale IDs. Keine Forward-References, keine Inkonsistenz bei Aenderungen."
    date: "2026-03-05"
  - id: "D_4.6_SCOPE"
    decision: "4.6 Requirements-Katalog substanziell (~3-4 Seiten), zeigt systematische Anforderungsableitung"
    rationale: "Kernbeitrag von Kap. 4: Nachweis, dass regulatorische Requirements systematisch ableitbar sind. Nicht schlank — demonstriert Methodik. Klare Trennung zu 5.3 (WAS vs. WIE)."
    date: "2026-03-06"
  - id: "D_4.6_VS_5.3_SEPARATION"
    decision: "4.6 = WAS geprüft werden muss (Requirements-Tabelle R-xx), 5.3 = WIE Gates technisch spezifiziert werden (Template, Trigger, Decision-Logik G-xx)"
    rationale: "DSR-logisch: 4.6 = Design Cycle Phase 1 (RQ1), 5.3 = Design Cycle Phase 2 (RQ2). Traceability Norm → Requirement → Gate bricht sonst an Kapitelgrenze."
    date: "2026-03-06"
  - id: "D_GOV_DIMENSIONS_HYBRID"
    decision: "Governance-Dimensionen hybrid: 4.6 einfuehren als Ergebnis der Norm-Analyse, 5.1 Konvergenz-Nachweis mit NIST/ISO"
    rationale: "4.6 sagt 'diese Cluster ergeben sich aus EU AI Act' (Art. 9→Risk Mgmt, Art. 13→Transparency etc.), 5.1 sagt 'NIST+ISO bestaetigen diese als international anerkannte Governance-Kategorien'. Abgrenzung zwischen Anforderungsanalyse und Architekturentscheidung."
    date: "2026-03-06"
  - id: "D_NIST_CONVERGENCE"
    decision: "NIST-Harmonisierung als Konvergenz-Argumentation in 5.1 (~1 Seite + Tabelle), nicht nur Mapping"
    rationale: "Konvergenz NIST AI RMF + ISO 42001 + EU AI Act = Rigor-Nachweis im DSR. Designprinzipien DP1-DP5 sind nicht willkuerlich, sondern in Knowledge Base verankert. Konsistent mit Methodik-Kapitel."
    date: "2026-03-06"
  - id: "D_KONSOLIDIERUNG_AUFGELOEST"
    decision: "Alter Abschnitt 4.5 Konsolidierung wird aufgeloest: Governance-Dimensionen → 4.6, NIST-Harmonisierung → 5.1, Clustering → 5.3"
    rationale: "Konsolidierung war kein eigenstaendiger DSR-Beitrag. Inhalte passen besser an ihre DSR-logischen Orte. 4.5 bleibt Human Oversight."
    date: "2026-03-06"
  - id: "D_KAP4_BUDGET_FLEX"
    decision: "Kap. 4 Seitenbudget flexibel auf ~14-15 Seiten erhoehen wenn noetig"
    rationale: "4.6 substanziell (3-4 S.) + 4.1-4.5 (~10.5 S.) = ~14.5 S. Kein kuenstliches Kuerzen — Kernbeitrag der Anforderungsableitung muss sauber dargestellt werden."
    date: "2026-03-06"
