id: R002
title: "Immutable Compliance Evidence – Append-Only Audit-Log fuer Gate-Entscheidungen"
type: "technical"
lifecycle_phase: "monitoring"
must_should: "MUST"
description: >
  Alle Quality-Gate-Entscheidungen MUSSEN in einem manipulationssicheren Evidence Store
  protokolliert werden. UPDATE- und DELETE-Operationen auf Audit-Eintraege sind technisch
  zu blockieren (BEFORE UPDATE OR DELETE Trigger). Eine Hash-Kette sichert die forensische
  Integritaet aller Eintraege.
eu_ai_act_refs:
  - "Art. 12 – Record-keeping"
  - "Art. 17 – Quality Management System"
evidence_expected:
  - "Trigger trg_prevent_ud blockiert UPDATE/DELETE auf compliance.quality_gate_results"
  - "Hash-Kette (hash_value, previous_hash) fuer jeden Eintrag nachweisbar"
  - "Kein Eintrag kann ohne Exception geaendert oder geloescht werden"
acceptance_criteria:
  - "Trigger-Funktion compliance.prevent_update_delete() ist aktiv und getestet"
  - "Hash-Chain-Trigger trg_set_hash_chain berechnet hash_value bei INSERT"
  - "INSERT-only Rechte fuer app_ingest_role verifiziert"
linked_gates:
  - "GCOMP-001"
sources:
  - "DP-2 Immutable Compliance Evidence (05_01_design_prinzipien/ambient_ai_scribe_sql_design_principles.md)"
  - "EU AI Act Art. 12"
  - "evidence_store_schema_v02_enterprise.sql (06_evaluation_RQ3/06_04_poc_scope_eval_deploy_prod/sql/)"
notes: "Abgeleitet aus DP-2. Kritisch fuer forensische Auditierbarkeit."
