summary_bullets:
- 'Abschnitt 4.2 Lifecycle-Modell (Pre-Deployment, Deployment, Operation) geschrieben — ~650 Woerter, 5 Absaetze, APA7.'
- 'Dreistufiges Deployer-Lifecycle-Modell abgeleitet aus Konvergenz von Leon (2026, 7 Stufen), Huwyler (2025, 6 Phasen), Ray (2026, TRiSM 4 Phasen) und Butt et al. (2026, GEAP 5 Promotion Gates).'
- 'Pre-Deployment = Deployer-seitige Due Diligence (Konformitaetserklaerung, FRIA, EU-DB-Registrierung); Deployment = kontrollierter Uebergang (Human Oversight Art. 14, Monitoring-Aktivierung); Operation = Continuous Monitoring, Meldepflicht Art. 26 Abs. 5, PMS Art. 72.'
- 'Quality Gates an Phasenuebergaengen positioniert — Konvergenz: Leon (Guardrails+QG jede Phase), Butt (Promotion Gates pass/waive/block + Evidence Backbone), Ray (PaC-Enforcement nur bei Threshold-Erfuellung).'
- 'Scope-Abgrenzung 1: Art. 25 Provider-Aufstieg bei wesentlicher Aenderung — Huwyler (S. 4) Fine-Tuning/RAG als Trigger. Tiefenanalyse → Kap. 7 Limitation.'
- 'Scope-Abgrenzung 2: Retirement-Phase explizit ausgeschlossen — Provider-Verantwortung Art. 16 Abs. 1 lit. j.'
- 'Kern-Quellen: Huwyler (2025), Leon (2026), Ray (2026), Butt et al. (2026). D_2026 beachtet: Butt+Leon nur konvergent.'
- 'Decisions beachtet: A9 (Art.25 inline), A10 (Retirement out), A11 (Gate-IDs erst 4.6), D_2026.'
