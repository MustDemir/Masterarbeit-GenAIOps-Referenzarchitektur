title: "4.1 Zielbild des Kontrollsystems — Fliesstext mit APA7-Zitaten"
umfang: "~1200 Woerter, 7 Absaetze, 26 APA7-Zitate, validiert"
inhalt: |
  Abschnitt 4.1 definiert das Zielbild der Referenzarchitektur und begruendet sechs architektonische Leitlinien:

  1. DEPLOYER-PERSPEKTIVE ALS SCOPE: Ausgangspunkt ist Art. 3 Nr. 4 (Deployer-Definition) und Art. 26 (Deployer-Pflichten). Unternehmen, die proprietaere Foundation Models via API nutzen, agieren als Deployer, nicht als Provider. Huwyler (2025, S. 3) bestaetigt Rollenunterscheidung. NIST AI RMF (2023, S. 5) identifiziert Risiko-Asymmetrie als strukturelles Merkmal: Deployer muss Risiken managen, die er nicht vollstaendig kontrolliert.

  2. ART. 10 DATEN-GOVERNANCE ABGRENZUNG: Art. 10 Abs. 1-5 setzt Trainingsdatenzugang voraus — fuer API-Deployer faktisch nicht anwendbar. Art. 10 Abs. 6 reduziert den Scope auf Testdatensaetze bei nicht-trainierten Systemen. Novelli et al. (2024, S. 9) bestaetigt: Data-Governance primaer Provider-orientiert. Ergo: Arbeit beschraenkt Art. 10 auf Testdatensatz-Scope.

  3. RAG-KLASSIFIZIERUNG: RAG-Kontextdaten = Inferenz-Eingabedaten (Art. 3 Nr. 33), NICHT Trainingsdaten (Art. 10). Regulatorische Anforderungen ergeben sich aus Art. 13 (Transparenz), Art. 15 (Robustheit), Art. 26 Abs. 4 (Eingabedatenrelevanz). Buscemi et al. (2025, S. 7-8) ordnen RAG-Pruefpflichten dem Transparenz-Requirement R4 zu. Implikation: RAG-spezifische Quality Gates muessen Qualitaet, Relevanz und Nachvollziehbarkeit zur Inferenzzeit sicherstellen.

  4. ENFORCEMENT STATT DOKUMENTATION: Zentrales Designziel = automatisierte Durchsetzung, nicht statische Dokumentation. Art. 9 fordert lifecycle-uebergreifendes Risikomanagement, Art. 15 Abs. 4 fordert Widerstandsfaehigkeit. NIST AI RMF operationalisiert dies als GOVERN/MAP/MEASURE/MANAGE. Huwyler (2025, S. 5-8) uebersetzt in 6-Phasen-Compliance. Unsere Uebersetzung: Policy-as-Code — Anforderungen als maschinenlesbare Policies in CI/CD/CT, Deployment nur bei bestandenen Quality Gates.

  5. ACCOUNTABILITY-BY-DESIGN: Nachvollziehbarkeit als inherente Systemeigenschaft, nicht nachtraegliche Massnahme. Art. 11 (technische Dokumentation) + Art. 12 (automatische Aufzeichnung). Buscemi et al. (2025, S. 5): Controls = Accountability + Traceability, Testing = empirische Evidenz. NIST GOVERN als uebergreifende Steuerungsinstanz. Implikation: Jeder Kontrollmechanismus muss auditierbaren Evidenz-Trail erzeugen (vgl. DP2).

  6. LIFECYCLE-VERANKERUNG: Dreigliedriges Modell (Pre-Deployment, Deployment, Operation) konsolidiert Huwyler (6 Phasen), NIST (Lifecycle-Dimensionen). Art. 9 = lifecycle-uebergreifend, Art. 26 Abs. 5 = Betriebsueberwachung. Art. 13 Abs. 3 = Betriebsanleitung als Informationsgrundlage. Art. 25 Caveat: Substanzielle Modifikation → Provider-Reklassifizierung.

  KERNTHESE: Wirksames Kontrollsystem dokumentiert nicht nur, sondern setzt Einhaltung automatisiert durch (DP1). Jeder Mechanismus erzeugt auditierbaren Evidenz-Trail mit Verantwortungszuordnung (DP2).
