title: "4.4 Kontrollmechanismen — Entwurf abgeschlossen"
umfang: "~650 Woerter, 5 Absaetze, APA7"
inhalt: |
  Abschnitt 4.4 beschreibt DREI komplementaere Kontrollmechanismen, die die Gate-Kriterien aus 4.3 automatisiert, kontinuierlich und nachweisbar pruefen.

  ARGUMENTATION:
  1. PROBLEMSTELLUNG: Art. 9 fordert kontinuierliches Risikomanagement ueber gesamten Lifecycle. Deployer kontrolliert Modellinterna nicht, muss aber gemaess Art. 26 Konformitaet nachweisen → erfordert drei operationale Kontrollmechanismen.

  2. POLICY-AS-CODE (PaC) — Kontrollmechanismus 1:
     Regulatorische Anforderungen als maschinenlesbare, automatisch durchsetzbare Regeln kodiert.
     - Ray (2026): PaC-Engines in CI/CD integriert — Bias-Schwellenwerte, Datenschutz-Guardrails, Dokumentationsvollstaendigkeit vor jedem Release. OPA (Open Policy Agent) als technische Basis.
     - Romeo et al. (2025): ARPaCCino — agentenbasierte RAG generiert aus natuerlichsprachlichen Compliance-Anforderungen automatisiert Rego-Regeln fuer OPA, iterative Validierung gegen IaC-Konfigurationen.
     → Requirements (R-xx) aus 4.3 werden als PaC-Policies kodiert und an Lifecycle-Phasenuebergaengen als Gate-Pruefungen ausgefuehrt.

  3. CONTINUOUS MONITORING — Kontrollmechanismus 2:
     Erweitert statische Gate-Pruefung um dynamische Ueberwachung in der Betriebsphase.
     - Buscemi et al. (2025): "continuous monitoring and post-deployment evaluation" statt einmaliger Bewertungen.
     - Ray (2026): Observability-Plattformen mit Infrastruktur-Metriken (Latenz, Ressourcen) + modellspezifischen KPIs (Drift-Indikatoren, Fairness-Metriken). Drift-Detektion via statistische Tests + Anomalie-Detektoren fuer Covariate-/Concept-Shifts.
     - Kovac et al. (2025): CERTAIN Semantic-MLOps-Engine — strukturierte Metadaten ueber alle Phasen fuer automatisierte Konformitaetspruefung gegen Zertifizierungsstandards.
     → Fuer Deployer besonders kritisch: einzige Moeglichkeit, Compliance-Abweichungen im Betrieb zu erkennen (Drift, Bias-Verschiebung).

  4. AUDIT TRAILS + EVIDENZARTEFAKTE — Kontrollmechanismus 3:
     Nachweisbasis fuer interne Audits und externe Konformitaetsbewertung (Art. 43).
     - Buscemi et al. (2025), M1.7: "system actions and decisions are recorded in tamper-evident logs for traceability"
     - Ray (2026): Zentralisierte Registries — Model Cards, Data Sheets, Audit Trails, versionierte Artefakte. On-Demand-Berichterstattung an Pruefer/Regulierungsbehoerden.
     - Kovac et al. (2025): Data-Lineage-Connector — Provenance-Informationen ueber Lifecycle verknuepft mit RegOps-Engine fuer Zertifizierungspruefung.
     - Sardana et al. (2024): Blockchain-basierte Audit Trails fuer manipulationssichere Dokumentation (ergaenzend).

  5. REGOPS-INTEGRATION (Synthese):
     Kovac (2025) praegte RegOps = DevOps-Prinzipien auf Compliance-Workflows uebertragen.
     Dreifach-Struktur:
     - PaC = statische Konformitaet an Gate-Uebergaengen
     - Continuous Monitoring = dynamische Abweichungserkennung im Betrieb
     - Audit Trails = revisionssichere Evidenz fuer beide Pruefmodi
     → Adressiert Beweislast-Asymmetrie aus 4.1: Deployer leitet Compliance-Nachweis aus automatisiert erzeugter Evidenzkette ab, ohne Provider-seitige Modellinterna zu benoetigen.

  KERNTHESE: PaC + Monitoring + Audit Trails als komplementaere Dreifach-Struktur loesen die Deployer-Beweislast-Asymmetrie. Kontrollmechanismus-Zuordnung zu Requirements/Gate-IDs → 4.6; technische Architektur → Kap. 5.
decisions:
  - "Sardana (JAIGS) nie alleinige Quelle — immer mit Ray oder Buscemi kombiniert"
  - "Romeo (arXiv) nur konvergent"
  - "Gate-IDs und Zuordnung erst in 4.6"
