title: "4.3 Transformationsmethodik — Entwurf abgeschlossen"
umfang: "~650 Woerter, 5 Absaetze, APA7"
inhalt: |
  Abschnitt 4.3 adressiert die Frage WIE abstrakte Normvorgaben in technisch pruefbare Gate-Kriterien ueberfuehrt werden (4.2 beantwortet WANN).

  ARGUMENTATION:
  1. TRANSFORMATIONSLUECKE IDENTIFIZIERT: Art. 9-15 formulieren prinzipienbasierte Pflichten, keine operationalen Pruefvorschriften.
     - Kelly et al. (2024, S. 1): Artikel "do not provide guidelines for achieving compliance"
     - Buscemi et al. (2025, S. 1): "persistent gap between high-level legal requirements and concrete verification activities"
     → Diese Luecke ist der Gegenstand des Abschnitts.

  2. VIER DEKOMPOSITIONSSTRATEGIEN AUS LITERATUR (unterschiedliche Domaenen, gleiche Grundstruktur):
     (a) Kelly et al. (2024) — Qualitaetsmodellbasiert: Erweitertes Qualitaetsmodell (ISO/IEC 25059) → Artikel auf Qualitaetsattribute abbilden → kontraktbasiert stakeholderspezifische technische Anforderungen ableiten. Domaene: Automobilindustrie.
     (b) Buscemi et al. (2025) — Verifikationsorientiert: Rechtsanforderungen → operationale Sub-Requirements → Verankerung in Standards → Verifikationsaktivitaeten in 2D-Verification-Space (Typ × Lifecycle-Ziel). Domaene: Automobilindustrie.
     (c) Gallina et al. (2025) — Ontologiebasiert: "mastering the cognitive complexity of the compliance problem" durch Traceability-Relationen zwischen Legislation, harmonisierten Standards und internen Prozessen. Domaene: Maschinenbau.
     (d) Feng et al. (2024) — Formal/RAINCOAT: Normative Anforderungen als maschinenlesbare Regeln in DSL + LLM-Extraktion semantischer Relationen fuer Konsistenzanalyse. Domaene: Robotik.

  3. KONVERGENZMUSTER: Alle vier nutzen mehrstufige Dekomposition mit bidirektionaler Traceability ueber mindestens eine Zwischenebene — trotz unterschiedlicher Zieldomaenen.

  4. DREISTUFIGE TRANSFORMATION FUER DEPLOYER-KONTEXT (eigener Beitrag):
     Stufe 1 — NORM-EXTRAKTION: Art. 9-15 auf Deployer-relevante Bestimmungen reduzieren (primaer Art. 26 i.V.m. Art. 9, 13, 14, 72) → strukturierte Anforderungskategorien.
     Stufe 2 — REQUIREMENT-SPEZIFIKATION: Extrahierte Anforderungen → messbare, lifecycle-phasen-zugeordnete Requirements (R-xx) mit Pruefbarer Eigenschaft + Pruefzeitpunkt + Evidenzerwartung.
     Stufe 3 — GATE-OPERATIONALISIERUNG: Requirements → automatisierte Gate-Pruefkriterien mit Pass/Fail-Semantik, als Policy-as-Code in CI/CD integrierbar.

  5. TRACEABILITY-KETTE (konstitutiv fuer Compliance-Nachweis):
     Normquelle (Artikel, Absatz) → Requirement (R-xx) → Gate-Kriterium → Evidenzartefakt
     Strukturell analog zu Butt et al. Evidence Backbone (signierte Artefakte ueber gesamten Lifecycle).
     Ermoeglicht interne Auditierbarkeit + externe Konformitaetsbewertung (Art. 43).

  6. SCOPE-ABGRENZUNGEN:
     - Nur Deployer-relevante Pflichten (Provider-spezifische Art. 43, Art. 11 ausgeschlossen soweit nicht mittelbar Deployer-Pruefpflichten begruendend)
     - Gate-IDs und Prueflogik → Abschnitt 4.6
     - Technische PaC-Realisierung → Kap. 5

  KERNTHESE: Mehrstufige Dekomposition mit bidirektionaler Traceability ist das konvergente methodische Muster — adaptiert fuer Deployer-spezifische EU-AI-Act-Compliance in drei Stufen (Norm → Requirement → Gate).
