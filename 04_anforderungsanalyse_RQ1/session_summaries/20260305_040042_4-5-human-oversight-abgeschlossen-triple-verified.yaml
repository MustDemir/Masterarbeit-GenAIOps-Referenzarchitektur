title: 4.5 Human Oversight — Entwurf triple-verified
summary_bullets:
- 'Abschnitt 4.5 Human Oversight (Art. 14) geschrieben — ~530 Woerter, 5 Absaetze, APA7.'
- 'Triple Verification bestanden: 12/12 KORREKT + 6/6 KONFORM + Kap.-4-Ziel BESTANDEN.'
- 'Art. 14 als Querschnittsverpflichtung identifiziert — durchdringt alle Gate-Pruefungen. Enqvist (2023): Pflichten reichen nicht ueber Provider hinaus. Ooms et al. (2025): Vagueness-Problem bei "angemessen"/"verhaeltnismaessig".'
- 'Vier Effektivitaetsbedingungen (Sterz et al. 2024, ACM FAccT): (1) Causal Power, (2) Epistemic Access, (3) Self-Control, (4) Fitting Intentions. Def. 3.5: Oversight-Person ist wirksam gdw. alle vier Bedingungen erfuellt.'
- 'Mapping Art. 14(4) auf Sterz-Bedingungen: (d)+(e) → Causal Power + Self-Control; (a)+(c) → Epistemic Access; (b) → Epistemic Access + Self-Control. Fitting Intentions = regulatorische Luecke (kein Aequivalent im Normtext).'
- 'Institutionalised Distrust (Laux 2024, AI & SOCIETY): 6 Designprinzipien (Justification, periodische Mandate, kollektive Entscheidungen, begrenzte institutionelle Kompetenz, Justizierbarkeit, Transparenz). First-Degree Oversight (konstitutiv) vs. Second-Degree Oversight (korrektiv).'
- 'Deployer-Provider-Asymmetrie: Art. 14 = Provider-Gestaltungspflicht, Art. 26 = Deployer-Ausfuehrung. Deployer-Kompetenzen nicht spezifiziert (Enqvist 2023).'
- 'Architektur-Implikation: 4 Effektivitaetsbedingungen als Gate-Kriterien. Epistemic Access → Erklaerbarkeitsartefakte + Dashboards. Causal Power → Eskalationspfade + Override. Periodische Mandate → Re-Evaluierungszyklen. Transparenz → Audit-Trail.'
- 'Laux-Datum korrigiert: (2023) → (2024) in chapter_state und Text. Sztompka (2000) als Sekundaerzitat ueber Laux akzeptiert.'
