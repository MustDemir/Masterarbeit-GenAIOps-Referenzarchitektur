title: "4.5 Human Oversight — Entwurf triple-verified"
umfang: "~530 Woerter, 5 Absaetze, APA7. Triple Verification: 12/12 KORREKT + 6/6 KONFORM + BESTANDEN."
inhalt: |
  Abschnitt 4.5 behandelt Human Oversight (Art. 14) als Querschnittsanforderung und entwickelt Gate-Kriterien aus zwei theoretischen Rahmen.

  ARGUMENTATION:
  1. ART. 14 ALS QUERSCHNITTSVERPFLICHTUNG: Art. 14 Abs. 1 verlangt wirksame Beaufsichtigung durch natuerliche Personen waehrend gesamter Nutzungsdauer. Durchdringt ALLE Gate-Pruefungen — jede setzt voraus, dass ein Mensch Ergebnisse interpretieren, bewerten und korrigierend eingreifen kann. Art. 14 Abs. 4 definiert fuenf Provider-seitige Massnahmen (Systemverstaendnis bis Stopp-Mechanismus).
     - Enqvist (2023): Keine Pflicht reicht ueber Provider hinaus; erheblicher Ermessensspielraum bei Ausgestaltung.
     - Ooms et al. (2025): Empirisch — Stakeholder bewerten "angemessen"/"verhaeltnismaessig" als zu vage.

  2. VIER EFFEKTIVITAETSBEDINGUNGEN (Sterz et al. 2024, ACM FAccT):
     Interdisziplinaere Synthese (Psychologie, Recht, Philosophie, Technik):
     (1) CAUSAL POWER — Faehigkeit, kausale Verbindung zum System/Auswirkungen herzustellen
     (2) EPISTEMIC ACCESS — hinreichendes Wissen ueber Entscheidungssituation
     (3) SELF-CONTROL — eigenstaendig entscheiden und umsetzen koennen
     (4) FITTING INTENTIONS — rollenangemessene Absichten
     Def. 3.5: Oversight-Person ist wirksam gdw. alle vier Bedingungen erfuellt.

  3. MAPPING AUF ART. 14 ABS. 4:
     - Massnahmen (d)+(e) = Nichtverwendung, Ausserkraftsetzung, Stopp → Causal Power + Self-Control
     - Massnahmen (a)+(c) = Systemverstaendnis, Outputinterpretation → Epistemic Access
     - Massnahme (b) = Automation-Bias-Bewusstsein → Epistemic Access + Self-Control
     - REGULATORISCHE LUECKE: Fitting Intentions hat keine Entsprechung im Normtext (Sterz et al.).

  4. INSTITUTIONALISED DISTRUST (Laux 2024, AI & SOCIETY):
     Demokratietheoretischer Governance-Rahmen (Sztompka 2000). 6 Designprinzipien:
     Justification, periodische Mandate, kollektive Entscheidungen, begrenzte institutionelle Kompetenz, Justizierbarkeit + Rechenschaftspflicht, Transparenz.
     Taxonomie: First-Degree Oversight (konstitutiv, kontrafaktischer Einfluss) vs. Second-Degree Oversight (korrektiv, nachtraeglich).
     → Pre-Deployment/Deployment-Gates = First-Degree Oversight (Pruefergebnisse konstitutiv fuer Freigabe)
     → Post-Deployment-Monitoring = Second-Degree Oversight

  5. DEPLOYER-PROVIDER-ASYMMETRIE + ARCHITEKTUR-IMPLIKATION:
     Art. 14 = Provider-Gestaltungspflicht, Art. 26 = Deployer-Ausfuehrung — Deployer-Kompetenzen nicht spezifiziert (Enqvist). Laux: "geteilte Verantwortung".
     Referenzarchitektur muss integrieren:
     - Epistemic Access → Erklaerbarkeitsartefakte + Monitoring-Dashboards
     - Causal Power → Eskalationspfade + Override-Mechanismen
     - Periodische Mandate → zeitgebundene Re-Evaluierungszyklen
     - Transparenz → Audit-Trail-Anforderung
     - Justizierbarkeit → Nachweispflicht gegenueber Betroffenen

  KERNTHESE: Human Oversight ist keine binaere Checkbox, sondern erfordert vier gleichzeitig erfuellte Effektivitaetsbedingungen (Sterz) innerhalb eines institutionellen Governance-Rahmens (Laux). Die Architektur muss dies als pruefbare Gate-Kriterien operationalisieren.
