entscheidungen:
  - id: TIT-1
    typ: titel
    entscheidung: "Neuer Titel fixiert (Variante C4 – FINAL)"
    alter_titel: "Referenzarchitektur für GenAIOps mit integriertem lifecycle-basiertem Quality-Gate-Kontrollsystem zur Operationalisierung normativer Anforderungen im Enterprise-Kontext"
    zwischentitel_c2: "Referenzarchitektur für GenAIOps mit Quality-Gate-Kontrollsystem zur lifecycle-integrierten Operationalisierung normativer Anforderungen – auf Basis des EU AI Act"
    neuer_titel: "Cloud-native Referenzarchitektur für GenAIOps mit Quality-Gate-Kontrollsystem zur lifecycle-integrierten Operationalisierung normativer Anforderungen – auf Basis des EU AI Act"
    aenderungen:
      - "'integriertem lifecycle-basiertem' → 'lifecycle-integrierten' (flüssiger, als Adjektiv zur Operationalisierung)"
      - "'im Enterprise-Kontext' entfernt (redundant bei Referenzarchitektur)"
      - "'– auf Basis des EU AI Act' ergänzt (regulatorischer Scope sichtbar)"
      - "'Cloud-native' als Adjektiv vor 'Referenzarchitektur' ergänzt (Cloud-Aspekt fehlte in C2)"
    begruendung: "USP (Quality-Gate-Kontrollsystem) bleibt sichtbar, EU AI Act als normative Grundlage explizit, Cloud-native-Aspekt abgebildet, kürzer und eleganter"

  - id: TIT-2
    typ: semantik
    entscheidung: "'auf Basis' statt 'am Beispiel' oder 'im Kontext'"
    begruendung: "EU AI Act ist normative Quelle (Anforderungen werden daraus abgeleitet), nicht Anwendungsbeispiel (das wäre Healthcare/Azure). 'Im Kontext' zu vage."

  - id: TIT-3
    typ: titel-ergaenzung
    entscheidung: "'Cloud-native' vor 'Referenzarchitektur' ergänzt (C2 → C4)"
    begruendung: "Cloud-native-Aspekt (DP5, S3) fehlte im Titel. Als Adjektiv vor Referenzarchitektur natürlich integriert ohne Länge wesentlich zu erhöhen."

