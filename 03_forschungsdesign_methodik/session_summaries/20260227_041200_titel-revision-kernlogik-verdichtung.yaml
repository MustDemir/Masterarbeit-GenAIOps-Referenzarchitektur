  artefakt: "Cloud-native Referenzarchitektur → im Titel: 'Cloud-native Referenzarchitektur für GenAIOps'"
  designprinzip: "Lifecycle-basiertes Quality-Gate-Kontrollsystem → im Titel: 'mit Quality-Gate-Kontrollsystem' + 'lifecycle-integrierten'"
  wirkung: "Technische Operationalisierung & Nachweisbarkeit → im Titel: 'Operationalisierung' (Nachweisbarkeit implizit)"
  demonstration: "Azure-PoC → nicht im Titel (gehört in Abstract/Kap. 5)"
  methodik: "DSR → nicht im Titel (implizit, wie gewünscht)"
  regulatorik: "EU AI Act → im Titel: '– auf Basis des EU AI Act'"

