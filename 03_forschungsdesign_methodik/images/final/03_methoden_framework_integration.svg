<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 780" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2C5F8A"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="460" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Abbildung X: Methodischer Rahmen — Integration dreier DSR-Frameworks</text>

  <!-- ============================================================ -->
  <!-- LAYER 1: Meta-Ebene (Hevner) -->
  <!-- ============================================================ -->
  <rect x="10" y="42" width="900" height="200" rx="8" fill="#EDF2F7" stroke="#B0C4DE" stroke-width="1.5"/>
  <text x="25" y="62" font-size="12" font-weight="bold" fill="#2C5F8A">Meta-Ebene: Qualitätsrahmen</text>
  <text x="25" y="76" font-size="10" fill="#555">Hevner et al. (2004, S. 80) + Hevner (2007, S. 88)</text>

  <!-- Relevance Cycle -->
  <rect x="40" y="90" width="240" height="65" rx="6" fill="#fff" stroke="#2C5F8A" stroke-width="1.5"/>
  <text x="160" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C5F8A">Relevance Cycle</text>
  <text x="160" y="128" text-anchor="middle" font-size="10" fill="#555">Anwendungskontext:</text>
  <text x="160" y="141" text-anchor="middle" font-size="10" fill="#555">Enterprise GenAI-Systeme</text>

  <!-- Design Cycle -->
  <rect x="340" y="90" width="240" height="65" rx="6" fill="#fff" stroke="#2C5F8A" stroke-width="2"/>
  <text x="460" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C5F8A">Design Cycle</text>
  <text x="460" y="128" text-anchor="middle" font-size="10" fill="#555">Build ↔ Evaluate</text>
  <text x="460" y="141" text-anchor="middle" font-size="10" fill="#555">(2 Iterationen)</text>

  <!-- Rigor Cycle -->
  <rect x="640" y="90" width="240" height="65" rx="6" fill="#fff" stroke="#2C5F8A" stroke-width="1.5"/>
  <text x="760" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C5F8A">Rigor Cycle</text>
  <text x="760" y="128" text-anchor="middle" font-size="10" fill="#555">Wissensbasis:</text>
  <text x="760" y="141" text-anchor="middle" font-size="10" fill="#555">8 Domänen (Kap. 2)</text>

  <!-- Arrows between cycles -->
  <line x1="280" y1="122" x2="338" y2="122" stroke="#2C5F8A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="580" y1="122" x2="638" y2="122" stroke="#2C5F8A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- G1-G7 label -->
  <rect x="370" y="170" width="180" height="24" rx="4" fill="#2C5F8A" opacity="0.1" stroke="#2C5F8A" stroke-width="1"/>
  <text x="460" y="186" text-anchor="middle" font-size="10" fill="#2C5F8A">Richtlinien G1–G7 als Qualitätsfilter</text>

  <!-- Kap references -->
  <text x="160" y="210" text-anchor="middle" font-size="9" fill="#888">→ Kap. 4 (Anforderungen)</text>
  <text x="460" y="210" text-anchor="middle" font-size="9" fill="#888">→ Kap. 4 + 5 (Konstruktion)</text>
  <text x="760" y="210" text-anchor="middle" font-size="9" fill="#888">→ Kap. 2 (Theorie) + Kap. 6 (Eval.)</text>

  <!-- ============================================================ -->
  <!-- Connecting arrows Layer 1 → Layer 2 -->
  <!-- ============================================================ -->
  <line x1="160" y1="224" x2="105" y2="270" stroke="#888" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>
  <line x1="460" y1="224" x2="460" y2="270" stroke="#888" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>
  <line x1="760" y1="224" x2="700" y2="270" stroke="#888" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>

  <!-- ============================================================ -->
  <!-- LAYER 2: Prozessebene (Peffers DSRM) -->
  <!-- ============================================================ -->
  <rect x="10" y="272" width="900" height="230" rx="8" fill="#F7F7F0" stroke="#C4B878" stroke-width="1.5"/>
  <text x="25" y="292" font-size="12" font-weight="bold" fill="#7A6B2E">Prozessebene: Vorgehensmodell (DSRM)</text>
  <text x="25" y="306" font-size="10" fill="#555">Peffers et al. (2007, S. 52–56) — Problem-centered initiation</text>

  <!-- 6 DSRM Steps -->
  <!-- Step 1 -->
  <rect x="25" y="320" width="130" height="52" rx="5" fill="#fff" stroke="#7A6B2E" stroke-width="1.2"/>
  <text x="90" y="339" text-anchor="middle" font-size="10" font-weight="bold" fill="#7A6B2E">1. Problem-</text>
  <text x="90" y="352" text-anchor="middle" font-size="10" font-weight="bold" fill="#7A6B2E">identifikation</text>
  <text x="90" y="366" text-anchor="middle" font-size="9" fill="#888">Kap. 1 + 3.1</text>

  <!-- Arrow -->
  <line x1="155" y1="346" x2="168" y2="346" stroke="#7A6B2E" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="170" y="320" width="120" height="52" rx="5" fill="#fff" stroke="#7A6B2E" stroke-width="1.2"/>
  <text x="230" y="339" text-anchor="middle" font-size="10" font-weight="bold" fill="#7A6B2E">2. Lösungs-</text>
  <text x="230" y="352" text-anchor="middle" font-size="10" font-weight="bold" fill="#7A6B2E">ziele</text>
  <text x="230" y="366" text-anchor="middle" font-size="9" fill="#888">Kap. 3.2 + 3.3</text>

  <!-- Arrow -->
  <line x1="290" y1="346" x2="303" y2="346" stroke="#7A6B2E" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="305" y="320" width="130" height="52" rx="5" fill="#E8F0FE" stroke="#2C5F8A" stroke-width="1.8"/>
  <text x="370" y="339" text-anchor="middle" font-size="10" font-weight="bold" fill="#2C5F8A">3. Entwurf &amp;</text>
  <text x="370" y="352" text-anchor="middle" font-size="10" font-weight="bold" fill="#2C5F8A">Entwicklung</text>
  <text x="370" y="366" text-anchor="middle" font-size="9" fill="#888">Kap. 4 + 5</text>

  <!-- Arrow -->
  <line x1="435" y1="346" x2="448" y2="346" stroke="#7A6B2E" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <rect x="450" y="320" width="120" height="52" rx="5" fill="#E8F0FE" stroke="#2C5F8A" stroke-width="1.8"/>
  <text x="510" y="339" text-anchor="middle" font-size="10" font-weight="bold" fill="#2C5F8A">4. Demon-</text>
  <text x="510" y="352" text-anchor="middle" font-size="10" font-weight="bold" fill="#2C5F8A">stration</text>
  <text x="510" y="366" text-anchor="middle" font-size="9" fill="#888">Kap. 5 (PoC)</text>

  <!-- Arrow -->
  <line x1="570" y1="346" x2="583" y2="346" stroke="#7A6B2E" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Step 5 -->
  <rect x="585" y="320" width="120" height="52" rx="5" fill="#fff" stroke="#7A6B2E" stroke-width="1.2"/>
  <text x="645" y="339" text-anchor="middle" font-size="10" font-weight="bold" fill="#7A6B2E">5. Evaluation</text>
  <text x="645" y="366" text-anchor="middle" font-size="9" fill="#888">Kap. 6</text>

  <!-- Arrow -->
  <line x1="705" y1="346" x2="718" y2="346" stroke="#7A6B2E" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Step 6 -->
  <rect x="720" y="320" width="130" height="52" rx="5" fill="#fff" stroke="#7A6B2E" stroke-width="1.2"/>
  <text x="785" y="339" text-anchor="middle" font-size="10" font-weight="bold" fill="#7A6B2E">6. Kommuni-</text>
  <text x="785" y="352" text-anchor="middle" font-size="10" font-weight="bold" fill="#7A6B2E">kation</text>
  <text x="785" y="366" text-anchor="middle" font-size="9" fill="#888">Kap. 7 + 8</text>

  <!-- Iteration 1 Arc -->
  <path d="M 370 375 Q 370 405 510 405 Q 650 405 645 375" fill="none" stroke="#2C5F8A" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="510" y="418" text-anchor="middle" font-size="9" fill="#2C5F8A">Iteration 1: Konzeptuelles Artefakt (Kap. 4 + 5)</text>

  <!-- Iteration 2 Arc -->
  <path d="M 305 375 Q 305 440 510 440 Q 715 440 705 375" fill="none" stroke="#2C5F8A" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="510" y="453" text-anchor="middle" font-size="9" fill="#2C5F8A">Iteration 2: PoC-Instanziierung + Refinement (Kap. 5 + 6)</text>

  <!-- Entry point marker -->
  <circle cx="90" cy="316" r="5" fill="#7A6B2E"/>
  <text x="100" y="313" font-size="8" fill="#7A6B2E">Entry Point</text>

  <!-- Design Cycle bracket label -->
  <rect x="310" y="460" width="260" height="20" rx="3" fill="#2C5F8A" opacity="0.08"/>
  <text x="440" y="474" text-anchor="middle" font-size="9" fill="#2C5F8A">↑ Design Cycle (Hevner) ↑</text>

  <!-- ============================================================ -->
  <!-- Connecting arrows Layer 2 → Layer 3 -->
  <!-- ============================================================ -->
  <line x1="90" y1="488" x2="110" y2="518" stroke="#888" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>
  <line x1="460" y1="488" x2="460" y2="518" stroke="#888" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>
  <line x1="785" y1="488" x2="770" y2="518" stroke="#888" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>

  <!-- ============================================================ -->
  <!-- LAYER 3: Kommunikationsebene (vom Brocke DSR Grid) -->
  <!-- ============================================================ -->
  <rect x="10" y="520" width="900" height="200" rx="8" fill="#F0F7F0" stroke="#5A8A5A" stroke-width="1.5"/>
  <text x="25" y="540" font-size="12" font-weight="bold" fill="#3A6A3A">Kommunikationsebene: Planungsinstrument (DSR Grid)</text>
  <text x="25" y="554" font-size="10" fill="#555">vom Brocke &amp; Maedche (2019, S. 379–380) — 6 gleichwertige Dimensionen</text>

  <!-- DSR Grid 2×3 -->
  <!-- Row 1 -->
  <rect x="100" y="570" width="210" height="55" rx="5" fill="#fff" stroke="#5A8A5A" stroke-width="1.3"/>
  <text x="205" y="593" text-anchor="middle" font-size="11" font-weight="bold" fill="#3A6A3A">Problem</text>
  <text x="205" y="607" text-anchor="middle" font-size="9" fill="#888">PD1–PD3; Stakeholder</text>

  <rect x="355" y="570" width="210" height="55" rx="5" fill="#fff" stroke="#5A8A5A" stroke-width="1.3"/>
  <text x="460" y="593" text-anchor="middle" font-size="11" font-weight="bold" fill="#3A6A3A">Research Process</text>
  <text x="460" y="607" text-anchor="middle" font-size="9" fill="#888">DSRM 6 Aktivitäten, 2 Iter.</text>

  <rect x="610" y="570" width="210" height="55" rx="5" fill="#fff" stroke="#5A8A5A" stroke-width="1.3"/>
  <text x="715" y="593" text-anchor="middle" font-size="11" font-weight="bold" fill="#3A6A3A">Solution</text>
  <text x="715" y="607" text-anchor="middle" font-size="9" fill="#888">Referenzarchitektur + QG-System</text>

  <!-- Row 2 -->
  <rect x="100" y="635" width="210" height="55" rx="5" fill="#fff" stroke="#5A8A5A" stroke-width="1.3"/>
  <text x="205" y="658" text-anchor="middle" font-size="11" font-weight="bold" fill="#3A6A3A">Input Knowledge</text>
  <text x="205" y="672" text-anchor="middle" font-size="9" fill="#888">PaC, CaC, NIST AI RMF, RefArch</text>

  <rect x="355" y="635" width="210" height="55" rx="5" fill="#fff" stroke="#5A8A5A" stroke-width="1.3"/>
  <text x="460" y="658" text-anchor="middle" font-size="11" font-weight="bold" fill="#3A6A3A">Key Concepts</text>
  <text x="460" y="672" text-anchor="middle" font-size="9" fill="#888">DP1–DP5, Gate-Taxonomie</text>

  <rect x="610" y="635" width="210" height="55" rx="5" fill="#fff" stroke="#5A8A5A" stroke-width="1.3"/>
  <text x="715" y="658" text-anchor="middle" font-size="11" font-weight="bold" fill="#3A6A3A">Output Knowledge</text>
  <text x="715" y="672" text-anchor="middle" font-size="9" fill="#888">Design-Prinzipien, Eval.-Ergebnisse</text>

  <!-- Grid label -->
  <text x="460" y="710" text-anchor="middle" font-size="9" fill="#3A6A3A">→ Konkrete Belegung siehe Tabelle 3 (DSR Grid der vorliegenden Arbeit)</text>

