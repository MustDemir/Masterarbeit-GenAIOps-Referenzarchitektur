  <!-- Legend -->
  <!-- ============================================================ -->
  <rect x="10" y="735" width="900" height="38" rx="5" fill="#FAFAFA" stroke="#DDD" stroke-width="1"/>
  <rect x="25" y="748" width="14" height="10" rx="2" fill="#EDF2F7" stroke="#2C5F8A" stroke-width="1"/>
  <text x="44" y="757" font-size="9" fill="#555">Meta-Ebene (Hevner)</text>
  <rect x="170" y="748" width="14" height="10" rx="2" fill="#F7F7F0" stroke="#C4B878" stroke-width="1"/>
  <text x="189" y="757" font-size="9" fill="#555">Prozessebene (Peffers)</text>
  <rect x="330" y="748" width="14" height="10" rx="2" fill="#F0F7F0" stroke="#5A8A5A" stroke-width="1"/>
  <text x="349" y="757" font-size="9" fill="#555">Kommunikationsebene (vom Brocke)</text>
  <rect x="545" y="748" width="14" height="10" rx="2" fill="#E8F0FE" stroke="#2C5F8A" stroke-width="1.8"/>
  <text x="564" y="757" font-size="9" fill="#555">Design Cycle / Kernbeitrag</text>
  <line x1="700" y1="753" x2="730" y2="753" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="735" y="757" font-size="9" fill="#555">Konzeptionelle Verknüpfung</text>
