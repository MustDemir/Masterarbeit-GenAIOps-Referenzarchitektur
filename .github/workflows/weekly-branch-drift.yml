name: Weekly Branch Drift (On Demand)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch refs for drift snapshot (soft)
        run: |
          git fetch --no-tags origin main || true
          git fetch --no-tags origin thesis/rq2-poc-integration || true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run soft drift snapshot
        run: |
          python scripts/weekly_branch_drift.py \
            --json-out /tmp/branch_drift.json \
            --markdown-out /tmp/branch_drift.md

      - name: Publish summary
        run: cat /tmp/branch_drift.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload drift artifact
        uses: actions/upload-artifact@v4
        with:
          name: branch-drift-snapshot
          path: |
            /tmp/branch_drift.json
            /tmp/branch_drift.md
