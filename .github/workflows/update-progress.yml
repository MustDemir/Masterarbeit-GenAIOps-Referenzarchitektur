name: Update Progress Bars

on:
  # Jeden Montag um 06:00 UTC
  schedule:
    - cron: "0 6 * * 1"
  # Bei Aenderungen an _status.yml Dateien
  push:
    paths:
      - "**/_status.yml"
  # Manuell ausloesbar
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-progress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Update progress bars in README
        run: python scripts/update_progress.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || {
            git add README.md
            git commit -m "chore: update progress bars [automated]"
            git push
          }
